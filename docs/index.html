<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Analiz</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./styles.css?v=20260723d" />
  <script src="./vendor/chart.umd.min.js"></script>
  <script src="./app.js?v=20260723d" defer></script>
</head>
<body>
  <svg class="turtle-bg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" aria-hidden="true" style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0">
    <defs>
      <symbol id="turtle-symbol" viewBox="0 0 120 92">
        <ellipse cx="60" cy="53" rx="34" ry="26" fill="#124D1C" opacity="0.18" stroke="#0B1849" stroke-width="4"/>
        <path d="M32 53c13-14 42-14 56 0M60 28v50M41 39l19 14-19 14M79 39 60 53l19 14" fill="none" stroke="#0B1849" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.38"/>
        <circle cx="60" cy="17" r="11" fill="#E4B028" opacity="0.3" stroke="#0B1849" stroke-width="4"/>
        <path d="M60 28v5" fill="none" stroke="#0B1849" stroke-width="4" stroke-linecap="round"/>
        <ellipse cx="25" cy="49" rx="13" ry="7" fill="#124D1C" opacity="0.18" stroke="#0B1849" stroke-width="4" transform="rotate(-25 25 49)"/>
        <ellipse cx="95" cy="49" rx="13" ry="7" fill="#124D1C" opacity="0.18" stroke="#0B1849" stroke-width="4" transform="rotate(25 95 49)"/>
        <ellipse cx="34" cy="78" rx="13" ry="7" fill="#124D1C" opacity="0.18" stroke="#0B1849" stroke-width="4" transform="rotate(24 34 78)"/>
        <ellipse cx="86" cy="78" rx="13" ry="7" fill="#124D1C" opacity="0.18" stroke="#0B1849" stroke-width="4" transform="rotate(-24 86 78)"/>
      </symbol>
    </defs>
    <use class="turtle-stamp" href="#turtle-symbol" x="-30" y="34" width="210" height="161" opacity="0.28" transform="rotate(-10 75 115)" />
    <use class="turtle-stamp" href="#turtle-symbol" x="196" y="2" width="168" height="129" opacity="0.2" transform="rotate(14 280 67)" />
    <use class="turtle-stamp" href="#turtle-symbol" x="442" y="48" width="226" height="173" opacity="0.23" transform="rotate(-18 555 135)" />
    <use class="turtle-stamp" href="#turtle-symbol" x="720" y="-8" width="188" height="144" opacity="0.21" transform="rotate(9 814 64)" />
    <use class="turtle-stamp" href="#turtle-symbol" x="1000" y="42" width="244" height="187" opacity="0.26" transform="rotate(-13 1122 135)" />
    <use class="turtle-stamp" href="#turtle-symbol" x="82" y="228" width="236" height="181" opacity="0.24" transform="rotate(18 200 318)" />
    <use class="turtle-stamp" href="#turtle-symbol" x="352" y="238" width="190" height="146" opacity="0.19" transform="rotate(-7 447 311)" />
    <use class="turtle-stamp" href="#turtle-symbol" x="610" y="210" width="260" height="199" opacity="0.27" transform="rotate(13 740 310)" />
    <use class="turtle-stamp" href="#turtle-symbol" x="912" y="248" width="206" height="158" opacity="0.22" transform="rotate(-20 1015 327)" />
    <use class="turtle-stamp" href="#turtle-symbol" x="-18" y="484" width="246" height="189" opacity="0.25" transform="rotate(10 105 578)" />
    <use class="turtle-stamp" href="#turtle-symbol" x="256" y="510" width="204" height="156" opacity="0.2" transform="rotate(-16 358 588)" />
    <use class="turtle-stamp" href="#turtle-symbol" x="524" y="486" width="238" height="182" opacity="0.24" transform="rotate(20 643 577)" />
    <use class="turtle-stamp" href="#turtle-symbol" x="820" y="506" width="224" height="172" opacity="0.22" transform="rotate(-8 932 592)" />
    <use class="turtle-stamp" href="#turtle-symbol" x="1040" y="548" width="188" height="144" opacity="0.19" transform="rotate(16 1134 620)" />
  </svg>

  <main class="shell">
    <header class="topbar">
      <div>
        <h1>Chat Analiz</h1>
        <p id="metaLine">Sifreli veri bekleniyor</p>
      </div>
      <button type="button" id="lockButton" class="ghost-button" hidden>Kilitle</button>
    </header>

    <section id="unlockPanel" class="unlock-overlay" role="dialog" aria-modal="true" aria-labelledby="unlockTitle">
      <form id="unlockForm" class="unlock-form">
        <h2 id="unlockTitle">Kilidi ac</h2>
        <label for="passwordInput">Sifre</label>
        <div class="password-row">
          <input id="passwordInput" type="password" autocomplete="current-password" placeholder="sifre" autofocus />
          <button type="submit" id="unlockButton">Ac</button>
        </div>
        <p id="unlockStatus" class="status-line"></p>
        <button type="button" id="guestButton" class="guest-button">Sifresiz devam et</button>
      </form>
    </section>

    <section id="appPanel" class="app-panel">
      <div class="toolbar">
        <div class="search-wrap">
          <input id="searchInput" type="text" autocomplete="off" spellcheck="false" placeholder="kelime ara" disabled />
        </div>

        <div class="segmented" role="group" aria-label="veri turu">
          <button type="button" id="dailyButton">Gunluk</button>
          <button type="button" id="cumulativeButton" class="active">Kumulatif</button>
        </div>

        <div class="segmented" role="group" aria-label="donem">
          <button type="button" id="dayButton" class="active">Gun</button>
          <button type="button" id="monthButton">Ay</button>
        </div>

        <label class="import-button">
          TXT Sec
          <input id="chatFileInput" type="file" accept=".txt,text/plain" />
        </label>
      </div>

      <div class="chart-panel">
        <div class="ticker-row">
          <div class="ticker-main">
            <div id="tickerValue" class="ticker-value">-</div>
            <div>
              <div id="tickerQuery" class="ticker-query">-</div>
              <div id="tickerDate" class="ticker-date">kelime ara</div>
            </div>
          </div>
          <div id="changePill" class="change-pill">
            <span id="changeDates"></span>
            <strong id="changeDelta"></strong>
          </div>
        </div>

        <div class="chart-box">
          <p id="placeholder" class="placeholder">kelime ara</p>
          <canvas id="chartCanvas" hidden></canvas>
        </div>
      </div>

      <div id="statsGrid" class="stats-grid" hidden>
        <article>
          <span>Toplam</span>
          <strong id="statTotal">0</strong>
          <small id="statKeyword">-</small>
        </article>
        <article>
          <span>Zirve</span>
          <strong id="statPeak">-</strong>
          <small id="statPeakCount">0 kez</small>
        </article>
        <article>
          <span>Aktif Donem</span>
          <strong id="statActive">-</strong>
          <small>en az 1 mesaj</small>
        </article>
        <article>
          <span>Ortalama</span>
          <strong id="statAverage">-</strong>
          <small>aktif donemlerde</small>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
