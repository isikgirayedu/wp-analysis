<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Analiz</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./styles.css?v=20260723b" />
  <script src="./vendor/chart.umd.min.js"></script>
  <script src="./app.js?v=20260723b" defer></script>
</head>
<body>
  <svg class="turtle-bg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <symbol id="turtle-symbol" viewBox="0 0 100 100">
        <ellipse cx="50" cy="57" rx="29" ry="23" fill="#0B1849" opacity="0.22"/>
        <ellipse cx="50" cy="55" rx="24" ry="19" fill="#124D1C"/>
        <path d="M31 54c9-14 29-16 39 0-8 16-29 16-39 0Z" fill="#E4B028" opacity="0.38"/>
        <path d="M50 38l10 12-10 14-10-14Z" fill="#EBEDE3" opacity="0.72"/>
        <circle cx="50" cy="29" r="9" fill="#124D1C"/>
        <circle cx="46.5" cy="27" r="1.7" fill="#EBEDE3"/>
        <circle cx="53.5" cy="27" r="1.7" fill="#EBEDE3"/>
        <ellipse cx="25" cy="50" rx="8" ry="4.5" fill="#124D1C" transform="rotate(-30 25 50)"/>
        <ellipse cx="75" cy="50" rx="8" ry="4.5" fill="#124D1C" transform="rotate(30 75 50)"/>
        <ellipse cx="30" cy="73" rx="8" ry="4.5" fill="#124D1C" transform="rotate(24 30 73)"/>
        <ellipse cx="70" cy="73" rx="8" ry="4.5" fill="#124D1C" transform="rotate(-24 70 73)"/>
      </symbol>
    </defs>
    <use href="#turtle-symbol" x="35" y="56" width="128" height="128" opacity="0.22" transform="rotate(-10 99 120)" />
    <use href="#turtle-symbol" x="922" y="70" width="105" height="105" opacity="0.18" transform="rotate(16 974 122)" />
    <use href="#turtle-symbol" x="1036" y="324" width="144" height="144" opacity="0.2" transform="rotate(-21 1108 396)" />
    <use href="#turtle-symbol" x="76" y="512" width="112" height="112" opacity="0.18" transform="rotate(22 132 568)" />
    <use href="#turtle-symbol" x="565" y="612" width="92" height="92" opacity="0.17" transform="rotate(-7 611 658)" />
    <use href="#turtle-symbol" x="402" y="190" width="76" height="76" opacity="0.14" transform="rotate(11 440 228)" />
  </svg>

  <main class="shell">
    <header class="topbar">
      <div>
        <h1>Chat Analiz</h1>
        <p id="metaLine">Sifreli veri bekleniyor</p>
      </div>
      <button type="button" id="lockButton" class="ghost-button" hidden>Kilitle</button>
    </header>

    <section id="unlockPanel" class="unlock-overlay" role="dialog" aria-modal="true" aria-labelledby="unlockTitle">
      <form id="unlockForm" class="unlock-form">
        <h2 id="unlockTitle">Kilidi ac</h2>
        <label for="passwordInput">Sifre</label>
        <div class="password-row">
          <input id="passwordInput" type="password" autocomplete="current-password" placeholder="sifre" autofocus />
          <button type="submit" id="unlockButton">Ac</button>
        </div>
        <p id="unlockStatus" class="status-line"></p>
      </form>
    </section>

    <section id="appPanel" class="app-panel" hidden>
      <div class="toolbar">
        <div class="search-wrap">
          <input id="searchInput" type="text" autocomplete="off" spellcheck="false" placeholder="kelime ara" disabled />
        </div>

        <div class="segmented" role="group" aria-label="veri turu">
          <button type="button" id="dailyButton">Gunluk</button>
          <button type="button" id="cumulativeButton" class="active">Kumulatif</button>
        </div>

        <div class="segmented" role="group" aria-label="donem">
          <button type="button" id="dayButton" class="active">Gun</button>
          <button type="button" id="monthButton">Ay</button>
        </div>

        <label class="import-button">
          TXT Sec
          <input id="chatFileInput" type="file" accept=".txt,text/plain" />
        </label>
      </div>

      <div class="chart-panel">
        <div class="ticker-row">
          <div class="ticker-main">
            <div id="tickerValue" class="ticker-value">-</div>
            <div>
              <div id="tickerQuery" class="ticker-query">-</div>
              <div id="tickerDate" class="ticker-date">kelime ara</div>
            </div>
          </div>
          <div id="changePill" class="change-pill">
            <span id="changeDates"></span>
            <strong id="changeDelta"></strong>
          </div>
        </div>

        <div class="chart-box">
          <p id="placeholder" class="placeholder">kelime ara</p>
          <canvas id="chartCanvas" hidden></canvas>
        </div>
      </div>

      <div id="statsGrid" class="stats-grid" hidden>
        <article>
          <span>Toplam</span>
          <strong id="statTotal">0</strong>
          <small id="statKeyword">-</small>
        </article>
        <article>
          <span>Zirve</span>
          <strong id="statPeak">-</strong>
          <small id="statPeakCount">0 kez</small>
        </article>
        <article>
          <span>Aktif Donem</span>
          <strong id="statActive">-</strong>
          <small>en az 1 mesaj</small>
        </article>
        <article>
          <span>Ortalama</span>
          <strong id="statAverage">-</strong>
          <small>aktif donemlerde</small>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
